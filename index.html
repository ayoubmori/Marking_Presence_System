<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Live Presence Dashboard</h1>
                <p class="text-gray-500 mt-1">Real-time attendance tracking</p>
            </div>
            <button onclick="fetchRecords()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition">
                Refresh Data
            </button>
            <button onclick="downloadCsv()" class="download-btn">
                Download CSV
            </button>

        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">User</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Check In</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Check Out</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Duration</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="bg-white divide-y divide-gray-200">
                    <tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";

        function formatTime(isoString) {
            if (!isoString) return "<span class='text-gray-400'>--</span>";
            return new Date(isoString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        async function fetchRecords() {
            try {
                const response = await fetch(`${API_BASE}/presence/records`);
                const records = await response.json();
                const tbody = document.getElementById("table-body");
                tbody.innerHTML = "";

                if (records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-gray-500">No records today.</td></tr>';
                    return;
                }

                for (let i = records.length - 1; i >= 0; i--) {
                    const rec = records[i];
                    let badge = rec.checkout_at ? 
                        `<span class="px-2 py-1 text-xs rounded bg-gray-100 text-gray-800">Completed</span>` : 
                        `<span class="px-2 py-1 text-xs rounded bg-green-100 text-green-800">Active Shift</span>`;
                    
                    const dur = rec.duration_seconds ? `${rec.duration_seconds}s` : "--";

                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 font-bold">${rec.user_id} <span class="text-xs text-gray-400 font-normal block">${rec.context_id}</span></td>
                            <td class="px-6 py-4 text-sm">${formatTime(rec.checkin_at)}</td>
                            <td class="px-6 py-4 text-sm">${formatTime(rec.checkout_at)}</td>
                            <td class="px-6 py-4 text-sm">${dur}</td>
                            <td class="px-6 py-4">${badge}</td>
                        </tr>`;
                }
            } catch (e) {
                console.error("API offline");
            }
        }
        
        // Refresh table every 5 seconds automatically
        fetchRecords();
        setInterval(fetchRecords, 5000); 

        function downloadCsv() {
            window.location.href = "/presence/export";
        }


    </script>
</body>
</html>
